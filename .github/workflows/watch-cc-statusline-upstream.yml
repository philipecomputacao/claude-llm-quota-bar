name: Watch cc-statusline upstream

on:
  # Monday 09:00 BRT (12:00 UTC). Cheap: single ls-remote + API call only when
  # the upstream HEAD SHA differs from the last SHA we recorded.
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

# We need write access to bump ``.github/upstream-sha`` (the last-seen state
# file) and to open issues when the upstream gains new commits.
permissions:
  contents: write
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read known SHA + fetch upstream HEAD
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          KNOWN=""
          if [ -s .github/upstream-sha ]; then
            KNOWN="$(tr -d '[:space:]' < .github/upstream-sha)"
          fi
          UPSTREAM="$(git ls-remote https://github.com/Miluer-tcq/cc-statusline.git HEAD | cut -f1)"
          if [ -z "${UPSTREAM}" ]; then
            echo "::error::Could not resolve upstream HEAD"
            exit 1
          fi
          {
            echo "known=${KNOWN}"
            echo "current=${UPSTREAM}"
          } >> "$GITHUB_OUTPUT"
          if [ -n "${KNOWN}" ] && [ "${KNOWN}" != "${UPSTREAM}" ]; then
            echo "diverged=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Upstream cc-statusline diverged: ${KNOWN} -> ${UPSTREAM}"
          else
            echo "diverged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch commit list since known SHA
        if: steps.state.outputs.diverged == 'true'
        id: commits
        env:
          KNOWN: ${{ steps.state.outputs.known }}
          CURRENT: ${{ steps.state.outputs.current }}
        run: |
          if [ -n "${KNOWN}" ]; then
            url="https://api.github.com/repos/Miluer-tcq/cc-statusline/compare/${KNOWN}...${CURRENT}"
          else
            # First run, no baseline yet — show the last 10 upstream commits.
            url="https://api.github.com/repos/Miluer-tcq/cc-statusline/commits?per_page=10"
          fi
          payload="$(curl -fsSL -H 'Accept: application/vnd.github+json' "${url}")"
          printf 'commits<<EOF\n%s\nEOF\n' "${payload}" >> "$GITHUB_OUTPUT"

      - name: Run summary
        if: always()
        env:
          KNOWN: ${{ steps.state.outputs.known }}
          CURRENT: ${{ steps.state.outputs.current }}
          DIVERGED: ${{ steps.state.outputs.diverged }}
        run: |
          {
            echo "## Watch cc-statusline upstream"
            echo
            echo "- **Known SHA:** \`${KNOWN:-(none)}\`"
            echo "- **Current SHA:** \`${CURRENT}\`"
            echo "- **New upstream commits:** ${DIVERGED}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open / update issue
        if: steps.state.outputs.diverged == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const knownSha = '${{ steps.state.outputs.known }}' || '';
            const currentSha = '${{ steps.state.outputs.current }}';
            const payload = `${{ steps.commits.outputs.commits }}`;
            const label = 'upstream-watch';
            const repo = context.repo;

            const compareUrl = knownSha
              ? `https://github.com/Miluer-tcq/cc-statusline/compare/${knownSha}...${currentSha}`
              : `https://github.com/Miluer-tcq/cc-statusline/commits/${currentSha}`;

            // Parse commit messages from the compare or commits payload.
            let commitLines = [];
            try {
              const data = JSON.parse(payload);
              const list = Array.isArray(data) ? data : (data.commits || []);
              commitLines = list.map((c) => {
                const sha = (c.sha || '').slice(0, 7);
                const firstLine = (c.commit?.message || '').split('\n')[0];
                return `- \`${sha}\` ${firstLine}`;
              });
            } catch (e) {
              core.warning(`Could not parse upstream payload: ${e.message}`);
            }
            const commitBlock = commitLines.length
              ? commitLines.join('\n')
              : '_(could not parse upstream payload)_';

            const disclaimer = [
              '> **Atenção:** este projeto (`claude-llm-quota-bar`) é',
              '> **independente** do upstream `Miluer-tcq/cc-statusline`.',
              '> Esta issue é apenas uma **lista de leitura**. Nada é merged',
              '> automaticamente. Leia, escolha o que prestar, e porte',
              '> manualmente para cá se valer a pena.',
              '>',
              '> Após revisar, **feche esta issue**. O workflow abre uma',
              '> nova na próxima vez que o upstream tiver commits novos.',
            ].join('\n');

            const body = [
              `Upstream \`Miluer-tcq/cc-statusline\` tem commits novos desde a última checagem.`,
              '',
              `- **Known:** \`${knownSha || '(none — primeira execução)'}\``,
              `- **Current:** \`${currentSha}\``,
              `- **Compare:** ${compareUrl}`,
              '',
              '### Commits desde a última checagem',
              '',
              commitBlock,
              '',
              disclaimer,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              state: 'open',
              labels: label,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              core.info(`Appending to existing issue #${issue.number}`);
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issue.number,
                body: `🔄 Re-checked at ${new Date().toISOString()}\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: repo.owner,
                repo: repo.repo,
                title: `👀 Upstream cc-statusline diverged (${currentSha.slice(0, 7)})`,
                body,
                labels: [label, 'maintenance'],
              });
            }

      - name: Bump known SHA
        if: steps.state.outputs.diverged == 'true'
        env:
          NEW_SHA: ${{ steps.state.outputs.current }}
        run: |
          mkdir -p .github
          printf '%s' "${NEW_SHA}" > .github/upstream-sha
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/upstream-sha
          git commit -m "ci: bump upstream-known-sha to ${NEW_SHA:0:7}"
          git push
